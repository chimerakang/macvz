# A dedicated ServiceAccount exercises #51 (ServiceAccount token projection): the
# kubelet must mount a projected kube-api-access volume (bound token, cluster CA,
# namespace) into each Pod that names this account. The web and checker
# Deployments both run as this account.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: web-sa
  namespace: macvz-p6
  labels:
    app.kubernetes.io/part-of: macvz-p6-compat
