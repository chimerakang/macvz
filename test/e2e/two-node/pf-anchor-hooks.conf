# MacVz pf anchor hooks (issue #37 / docs/NETWORKING.md).
#
# These four lines must be referenced from the host's /etc/pf.conf so the kernel
# evaluates the anchor that podNetwork (pkg/network/podnet) regenerates on every
# Pod Attach/Detach. prep-node.sh appends these (idempotently) and reloads pf.
#
# Order matters in pf.conf: nat/rdr/binat anchors must appear with the other
# translation rules; the filter anchor with the filter rules. On a stock macOS
# pf.conf (which has no user rules) appending all four at the end is valid.
nat-anchor "macvz/pods/*"
rdr-anchor "macvz/pods/*"
binat-anchor "macvz/pods/*"
anchor "macvz/pods/*"
