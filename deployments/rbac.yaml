# RBAC for a macvz-kubelet virtual node, scoped to the P2 MVP.
#
# macvz-kubelet runs as a host process on the Mac (it drives apple/container, a
# host service) and talks to the cluster with the identity in its kubeconfig.
# For production, point that kubeconfig at the ServiceAccount token below; for
# local development an admin kubeconfig already covers these permissions.
#
# Apply with: kubectl apply -f deployments/rbac.yaml
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: macvz-kubelet
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: macvz-kubelet
rules:
  # Register the virtual node and read it back (waitForPodCIDR). The Virtual
  # Kubelet node controller only creates and gets the node; it never deletes it,
  # so `delete` is intentionally omitted (a stale node is removed by the
  # operator, not by macvz-kubelet).
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "create"]
  # Maintain the node's status (conditions, addresses, capacity) via patch.
  - apiGroups: [""]
    resources: ["nodes/status"]
    verbs: ["get", "patch", "update"]

  # Watch Pods scheduled to this node; the pod controller deletes Pods whose
  # workloads are gone. The Pod *spec* is never written, so update/patch on the
  # main resource are omitted (status is the separate rule below).
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  # Report Pod status back to the API server (UpdateStatus).
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["get", "update", "patch"]

  # The upstream pod controller builds informers over these even though MacVz
  # does not materialize their contents (env valueFrom and configMap/secret
  # volumes are rejected). Read-only, cluster-wide because Pods may land in any
  # namespace. See docs/SECURITY.md for scoping guidance.
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "services"]
    verbs: ["get", "list", "watch"]

  # Emit Pod/node lifecycle events.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch", "update"]

  # Node heartbeat lease in kube-node-lease. The v1 lease controller only
  # creates, gets, and updates the lease, so list/watch/patch/delete are omitted.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: macvz-kubelet
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: macvz-kubelet
subjects:
  - kind: ServiceAccount
    name: macvz-kubelet
    namespace: kube-system
# Note on `kubectl logs`/`exec`: these do not need extra permissions for the
# macvz-kubelet identity (it *serves* them). The API server proxies the request
# to the node's kubelet endpoint; the requesting user needs the usual
# pods/log and pods/exec (nodes/proxy) permissions, which cluster-admin has.
