# The Redis credential. A single Secret is consumed two different ways, so the
# fixture exercises both Secret projection paths:
#   - as env (secretKeyRef -> REDIS_PASSWORD) on the redis-leader and
#     redis-follower containers, which pass it to `--requirepass`/`--masterauth`;
#   - as a read-only file (/etc/guestbook-secret/redis-password) on the frontend
#     Pods, which the CGI reads to AUTH to Redis.
#
# MacVz must never log Secret values. The run.sh harness only asserts that auth
# works (a wrong password fails the write), never prints the password, and its
# failure diagnostics redact Secret material.
#
# stringData is used for readability; the API server stores it base64-encoded.
# This is a throwaway fixture credential, not a real one.
apiVersion: v1
kind: Secret
metadata:
  name: guestbook-redis
  namespace: macvz-guestbook
  labels:
    app.kubernetes.io/part-of: macvz-guestbook
type: Opaque
stringData:
  redis-password: "guestbook-fixture-redis-pw-do-not-use"
