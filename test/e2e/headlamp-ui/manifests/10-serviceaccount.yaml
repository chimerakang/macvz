apiVersion: v1
kind: ServiceAccount
metadata:
  name: headlamp
  namespace: macvz-headlamp
  labels:
    app.kubernetes.io/name: headlamp
    app.kubernetes.io/part-of: macvz-headlamp-ui
# The Pod consumes this account's projected token (#51) to talk to the in-cluster
# API server. Browser users authenticate separately with a bearer token whose
# RBAC governs what the UI can see and do (see 20-rbac.yaml).
