# The landing page served by nginx. It is an envsubst template: the Deployment's
# entrypoint substitutes ${POD_NAME}/${NODE_NAME} (from the Downward API) before
# nginx serves it, so each replica renders which MacVz micro-VM answered the
# request. That makes single-node vs. multi-node load-balancing visible in the
# browser just by refreshing.
apiVersion: v1
kind: ConfigMap
metadata:
  name: hello-page
  namespace: macvz-hello
  labels:
    app: hello
    app.kubernetes.io/part-of: macvz-hello-http
data:
  index.html: |
    <!doctype html>
    <html lang="en">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>MacVz · hello-http</title>
      <style>
        :root { color-scheme: dark; }
        body {
          margin: 0; min-height: 100vh; display: grid; place-items: center;
          font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
          background: radial-gradient(circle at 30% 20%, #1f2a44, #0b1020 70%);
          color: #e8ecf4;
        }
        .card {
          background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
          border-radius: 18px; padding: 2.5rem 3rem; box-shadow: 0 20px 60px rgba(0,0,0,.4);
          text-align: center; max-width: 32rem;
        }
        h1 { margin: 0 0 .25rem; font-size: 2rem; }
        p.tag { margin: 0 0 1.5rem; color: #93a1c4; }
        dl { display: grid; grid-template-columns: auto 1fr; gap: .4rem 1rem;
             text-align: left; margin: 0; font-variant-numeric: tabular-nums; }
        dt { color: #93a1c4; }
        dd { margin: 0; font-weight: 600; font-family: ui-monospace, monospace; }
        .ok { color: #5ad17f; }
      </style>
    </head>
    <body>
      <div class="card">
        <h1>It works on MacVz <span class="ok">✓</span></h1>
        <p class="tag">A public nginx image, served from an Apple Silicon micro-VM.</p>
        <dl>
          <dt>Served by pod</dt><dd>${POD_NAME}</dd>
          <dt>On virtual node</dt><dd>${NODE_NAME}</dd>
        </dl>
      </div>
    </body>
    </html>
