# CRI-L8-6 (#147) k3s conformance smoke subset fixture.
#
# A small, repeatable Kubernetes workload that represents *ordinary* workload
# compatibility for the experimental LinuxPod-backed CRI path. It is scheduled by
# a real Linux k3s/kubelet control plane onto a macOS MacVz CRI node running
# `macvz-cri --experimental-linuxpod-backend` (CRI-L, #125..#129).
#
# Unlike the focused sibling fixtures (linuxpod-workload.yaml = lifecycle/shared
# namespace; linuxpod-dns-workload.yaml = DNS), this fixture bundles the breadth
# of an ordinary workload into ONE apply so conformance-smoke.sh can prove the
# common surfaces a real chart relies on in a single repeatable pass:
#
#   Deployments · Services (ClusterIP + headless) · DNS · ConfigMaps · Secrets ·
#   projected volumes · readiness/liveness probes · restart policy · logs · exec ·
#   port-forward · cleanup · node readiness.
#
# It is deliberately a multi-container (app + late sidecar) Pod — the
# shared-namespace shape the LinuxPod backend models and the default
# apple/container path excludes (#82/#86) — so the smoke runs against the
# LinuxPod-backed node. conformance-smoke.sh inherits the #130 honesty gate:
# LinuxPod-specific framing only holds when a backend-evidence hook proves the
# Pod is genuinely (non-simulated) LinuxPod-backed; otherwise the ordinary
# Kubernetes checks still run but are reported against the apple/container path.
#
# Objects:
#   - smoke-config       ConfigMap: index.html marker + app.conf.
#   - smoke-secret       Secret: an opaque token.
#   - linuxpod-smoke     Deployment (app + late sidecar), one ClusterIP Service,
#                        one headless Service (Pod A records for DNS).
#   - linuxpod-smoke-restart  A separate one-replica Deployment whose container
#                        runs briefly then exits 0 on a loop, so the restart-policy
#                        phase can assert restartPolicy: Always bumped restartCount
#                        to >=1. This is deliberately backend-agnostic: it relies
#                        only on kubelet re-running an exited container, NOT on any
#                        volume surviving the restart (the apple/container
#                        per-container-VM model does not persist emptyDir across a
#                        container restart; that volume-persistence question is the
#                        separate CRI-L8-3 projection matrix, #145).
#
# Projected volume: the app mounts a `projected` volume that fans the ConfigMap,
# the Secret, and a downwardAPI field into one tree at /etc/projected — the
# multi-source projection ordinary charts use.
#
# #84 scheduling-exclusion opt-in is unchanged: select the MacVz runtime label
# and tolerate the host-namespace taint. Keys mirror pkg/criserver/nodescheme.go.
#
# Image: an arm64 busybox providing sh + httpd + wget + nslookup.
# conformance-smoke.sh substitutes MACVZ_CRI_IMAGE at apply time.
---
apiVersion: v1
kind: Namespace
metadata:
  name: macvz-cri-linuxpod-smoke-e2e
  labels:
    app.kubernetes.io/part-of: macvz-cri-linuxpod-smoke
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: smoke-config
  namespace: macvz-cri-linuxpod-smoke-e2e
data:
  index.html: |
    macvz-cri-l8-smoke-ok
  app.conf: |
    role=conformance-smoke-fixture
    marker=macvz-cri-l8-smoke-ok
---
apiVersion: v1
kind: Secret
metadata:
  name: smoke-secret
  namespace: macvz-cri-linuxpod-smoke-e2e
type: Opaque
stringData:
  token: macvz-cri-l8-smoke-secret-ok
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: linuxpod-smoke
  namespace: macvz-cri-linuxpod-smoke-e2e
  labels:
    app: linuxpod-smoke
spec:
  replicas: 1
  selector:
    matchLabels:
      app: linuxpod-smoke
  template:
    metadata:
      labels:
        app: linuxpod-smoke
    spec:
      nodeSelector:
        node.macvz.io/runtime: apple-container
      tolerations:
        - key: node.macvz.io/host-namespace-unsupported
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: app
          image: busybox:1.36.1
          command:
            - sh
            - -c
            - >-
              echo macvz-cri-l8-smoke-app-boot;
              httpd -f -p 8080 -h /www
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /index.html
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /index.html
              port: 8080
            # Tolerant on purpose: a healthy httpd inside a micro-VM under load
            # can be slow to answer, so a hair-trigger probe (default 1s timeout)
            # would kill a healthy container. A real workload sizes its liveness
            # probe to its environment; these values keep restartCount at 0 for a
            # healthy app so the probes phase's stability check is reliable.
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: web
              mountPath: /www
              readOnly: true
            - name: projected
              mountPath: /etc/projected
              readOnly: true
            - name: shared
              mountPath: /shared
        - name: sidecar
          image: busybox:1.36.1
          # Declared after the app (ordinary late-container order). At boot it
          # both (a) reaches the app over 127.0.0.1 to prove the shared Pod
          # network namespace and (b) reaches its own ClusterIP Service by its
          # *.svc DNS name (which only resolves via cluster DNS), recording both
          # proofs into the shared emptyDir for the exec phase. We reach the
          # Service by name with wget rather than nslookup because some busybox
          # builds ship without the nslookup applet. Idle after.
          command:
            - sh
            - -c
            - >-
              for i in $(seq 1 60); do
                if wget -T 2 -qO- http://127.0.0.1:8080/index.html | grep -q macvz-cri-l8-smoke-ok; then
                  echo macvz-cri-l8-smoke-localhost-ok > /shared/sidecar-localhost;
                  break;
                fi;
                sleep 1;
              done;
              for i in $(seq 1 60); do
                if wget -T 2 -qO- http://linuxpod-smoke.macvz-cri-linuxpod-smoke-e2e.svc.cluster.local/index.html | grep -q macvz-cri-l8-smoke-ok; then
                  echo macvz-cri-l8-smoke-dns-ok > /shared/sidecar-dns;
                  break;
                fi;
                sleep 1;
              done;
              echo macvz-cri-l8-smoke-sidecar-boot;
              tail -f /dev/null
          volumeMounts:
            - name: shared
              mountPath: /shared
      volumes:
        - name: web
          configMap:
            name: smoke-config
        - name: projected
          projected:
            sources:
              - configMap:
                  name: smoke-config
                  items:
                    - key: app.conf
                      path: app.conf
              - secret:
                  name: smoke-secret
                  items:
                    - key: token
                      path: token
              - downwardAPI:
                  items:
                    - path: pod-name
                      fieldRef:
                        fieldPath: metadata.name
        - name: shared
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: linuxpod-smoke
  namespace: macvz-cri-linuxpod-smoke-e2e
spec:
  type: ClusterIP
  selector:
    app: linuxpod-smoke
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: linuxpod-smoke-headless
  namespace: macvz-cri-linuxpod-smoke-e2e
spec:
  clusterIP: None
  selector:
    app: linuxpod-smoke
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: linuxpod-smoke-restart
  namespace: macvz-cri-linuxpod-smoke-e2e
  labels:
    app: linuxpod-smoke-restart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: linuxpod-smoke-restart
  template:
    metadata:
      labels:
        app: linuxpod-smoke-restart
    spec:
      nodeSelector:
        node.macvz.io/runtime: apple-container
      tolerations:
        - key: node.macvz.io/host-namespace-unsupported
          operator: Equal
          value: "true"
          effect: NoSchedule
      # restartPolicy: Always is the default; stated explicitly because this Pod
      # exists only to prove it. The container runs briefly, prints a marker, and
      # exits 0; kubelet re-runs it per the policy, so restartCount climbs. The
      # restart-policy phase only asserts restartCount >= 1 — a backend-agnostic
      # signal that needs no volume to survive the restart. (The Pod is therefore
      # intentionally a cycling container, not a long-lived Ready one.)
      restartPolicy: Always
      containers:
        - name: flapper
          image: busybox:1.36.1
          command:
            - sh
            - -c
            - >-
              echo macvz-cri-l8-smoke-restart-cycle;
              sleep 12;
              exit 0
