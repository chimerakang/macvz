# Example macvz-kubelet configuration.
# All fields are optional; omitted values fall back to built-in defaults.
# Run with: macvz-kubelet --config ./config.yaml

# Kubernetes node name this process registers as. Defaults to the OS hostname.
nodeName: mac-mini-01

# Path to the kubeconfig used to reach the API server.
# Leave empty to use in-cluster config or the KUBECONFIG environment variable.
kubeconfigPath: ""

# Reserved for future apple/container service API support. P1 uses runtimeBinary.
runtimeSocket: /var/run/com.apple.container.sock

# apple/container CLI to drive (path or PATH-resolved name). Defaults to "container".
runtimeBinary: container

# Filesystem path used for node disk and ephemeral-storage accounting. Leave
# empty for the operator's home directory, which matches apple/container's
# standard per-user data location. Set this if your runtime data is on a
# dedicated volume.
runtimeDataRoot: ""

# Log verbosity: "info" or "debug" (klog -v levels also honored via flags).
logLevel: info

# Node shape advertised to Kubernetes. All fields are optional.
node:
  # Capacity / allocatable resources. Kept conservative until P1 density data is
  # recorded; raise once per-VM RAM overhead is measured.
  cpu: "2"
  memory: 4Gi
  pods: "20"

  # Workload platform reported in node info and kubernetes.io/{os,arch} labels.
  # MacVz runs Linux micro-VMs on Apple Silicon, so this is linux/arm64 — not
  # the Darwin host.
  os: linux
  arch: arm64

  # Node InternalIP. Leave empty to auto-detect the host's primary outbound IPv4.
  internalIP: ""

  # Pod CIDR for coordinated Pod IPAM. Leave empty to use the Kubernetes-assigned
  # Node.Spec.PodCIDR only when running privileged network commands in-process.
  # When privilegedHelperSocket is set and podNetwork is enabled, this must be
  # filled explicitly so the root helper's static policy can validate pf rules.
  # Always give every MacVz node a disjoint CIDR.
  podCIDR: ""

  # Extra labels/annotations merged onto the node (override built-ins on clash).
  labels: {}
  annotations: {}

  # Scheduling taints. Defaults to the well-known Virtual Kubelet provider taint
  # so only Pods that tolerate MacVz are scheduled here. Set to [] to disable.
  taints:
    - key: virtual-kubelet.io/provider
      value: macvz
      effect: NoSchedule

  # Heartbeat / lease tuning. The coordination.k8s.io Lease is the node
  # heartbeat: Kubernetes marks the node NotReady if it is not renewed within
  # leaseDurationSeconds. Disable enableLease only on clusters without lease
  # support (then node status updates double as the heartbeat).
  enableLease: true
  leaseDurationSeconds: 40
  pingInterval: 10s          # node liveness Ping cadence
  statusUpdateInterval: 10s  # node status push + runtime readiness re-probe

  # Kubelet API (kubectl logs/exec). The Kubernetes API server connects to the
  # node's InternalIP on kubeletPort over HTTPS. Provide a serving cert+key to
  # enable logs/exec; leave them empty to run Pods without logs/exec support.
  kubeletPort: 10250
  servingTLSCertFile: ""     # e.g. /etc/macvz/pki/kubelet.crt
  servingTLSKeyFile: ""      # e.g. /etc/macvz/pki/kubelet.key

  # Cluster DNS injected into micro-VMs so Pods using the ClusterFirst DNS
  # policy resolve Service names in-guest (#37). Set to the cluster's CoreDNS/
  # kube-dns ClusterIP. Empty leaves each micro-VM with the DNS baked into its
  # image. Pairs with podNetwork to give working ClusterIP Service access.
  clusterDNS: []             # e.g. ["10.96.0.10"]
  clusterDomain: ""          # defaults to cluster.local when clusterDNS is set

# Cross-host WireGuard mesh. Disabled by default; see docs/NETWORKING.md for a
# complete two-node setup and pf anchor requirements.
mesh:
  enabled: false
  interface: utun7
  privateKeyFile: /etc/macvz/wireguard.key
  address: 10.99.0.1/32
  listenPort: 51820
  mtu: 0
  peers:
    - name: mac-mini-02
      publicKey: ""
      endpoint: 192.168.1.20:51820
      podCIDR: 10.244.2.0/24
      address: 10.99.0.2/32
      persistentKeepalive: 25

# Host Pod network path. Disabled by default; enable with mesh once the
# apple/container vmnet interface is known on the host.
podNetwork:
  enabled: false
  interface: bridge100
  anchor: macvz/pods
  enableForwarding: true
  # Host-only vmnet CIDRs local micro-VMs may receive. The privileged helper uses
  # these to validate pf rdr/binat targets. Omit to use the common default below.
  vmNetCIDRs: ["192.168.64.0/22"]

# Automatic orphan micro-VM cleanup (#67). The reaper periodically destroys MacVz
# micro-VMs whose backing Pod no longer exists on this node — a missed delete, or
# a Pod removed while the kubelet was down — so a leaked VM cannot pin host CPU,
# RAM, and disk. It never touches non-MacVz workloads, and a VM must stay
# orphaned for the whole gracePeriod before it is reaped (this absorbs the brief
# window where a VM exists but its Pod is not yet visible after creation or a
# restart). It does not flush the pf anchor (the node is live); the operator
# `macvz-kubelet cleanup` command and node-removal flow own anchor flushing.
orphanCleanup:
  enabled: true
  interval: 2m       # how often to scan for orphans
  gracePeriod: 10m   # how long a VM must stay orphaned before it is reaped (>= interval)
  dryRun: false      # set true to log what would be reaped without destroying anything
