# A Secret exercises #47 (Secret-backed env and volumes). web-secret is consumed
# two ways by the web Deployment:
#   - valueFrom.secretKeyRef: api-token is pulled into the API_TOKEN env var.
#   - a read-only volume mount at /etc/web-secret: api-token and db-password
#     appear as files in the guest.
# MacVz must never log Secret values; the run.sh harness only asserts presence,
# never prints the contents, and its diagnostics redact Secret data.
#
# stringData is used for readability; the API server stores it base64-encoded in
# data. These are throwaway test values, not real credentials.
apiVersion: v1
kind: Secret
metadata:
  name: web-secret
  namespace: macvz-p6
  labels:
    app.kubernetes.io/part-of: macvz-p6-compat
type: Opaque
stringData:
  api-token: "p6-fixture-token-do-not-use"
  db-password: "p6-fixture-password"
