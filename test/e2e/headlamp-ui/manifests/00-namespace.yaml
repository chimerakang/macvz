apiVersion: v1
kind: Namespace
metadata:
  name: macvz-headlamp
  labels:
    app.kubernetes.io/part-of: macvz-headlamp-ui
    # Headlamp itself runs hardened; declare the restricted PSS so the namespace
    # documents the expectation and a non-MacVz cluster enforces it too.
    pod-security.kubernetes.io/enforce: restricted
